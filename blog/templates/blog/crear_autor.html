{% extends 'blog/base.html' %}

{% block title %}Nuevo autor - Mi Blog{% endblock %}

{% block content %}
<section class="main-card p-4 p-md-5">
<h1 class="h3 mb-2">Crear nuevo autor</h1>
<p class="text-muted mb-4">Completá los datos para guardar un nuevo autor en la base.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Guardar autor</button>
</form>
</section>
{% endblock %}
