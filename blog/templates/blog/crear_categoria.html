{% extends 'blog/base.html' %}

{% block title %}Nueva categoría - Mi Blog{% endblock %}

{% block content %}
<section class="main-card p-4 p-md-5">
<h1 class="h3 mb-2">Crear nueva categoría</h1>
<p class="text-muted mb-4">Definí una categoría para organizar mejor los posts.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Guardar categoría</button>
</form>
</section>
{% endblock %}
