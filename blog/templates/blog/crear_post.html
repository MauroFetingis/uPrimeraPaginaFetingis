{% extends 'blog/base.html' %}

{% block title %}Nuevo post - Mi Blog{% endblock %}

{% block content %}
<section class="main-card p-4 p-md-5">
<h1 class="h3 mb-2">Crear nuevo post</h1>
<p class="text-muted mb-4">Escribí un título, contenido y elegí autor/categoría.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Publicar</button>
</form>
</section>
{% endblock %}
