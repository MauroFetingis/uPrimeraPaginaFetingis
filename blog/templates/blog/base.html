<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi Blog{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'blog:index' %}">Mi Blog</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:crear_autor' %}">Nuevo autor</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:crear_categoria' %}">Nueva categoría</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:crear_post' %}">Nuevo post</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:buscar_posts' %}">Buscar</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
