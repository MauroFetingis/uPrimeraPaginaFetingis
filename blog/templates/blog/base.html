<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi Blog{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #f3f6ff 0%, #f8fafc 100%);
            color: #1f2937;
            min-height: 100vh;
        }
        .brand-pill {
            background: #ffffff22;
            border: 1px solid #ffffff44;
            border-radius: 999px;
            padding: 0.35rem 0.85rem;
            font-weight: 600;
        }
        .main-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }
        .post-item {
            border: 1px solid #eceff5;
            border-radius: 12px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .post-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        .form-label {
            font-weight: 600;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary bg-gradient mb-4">
    <div class="container">
        <a class="navbar-brand brand-pill" href="{% url 'blog:index' %}">Spacing Away</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:crear_autor' %}">Nuevo autor</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:crear_categoria' %}">Nueva categoría</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:crear_post' %}">Nuevo post</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:buscar_posts' %}">Buscar</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container pb-5">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
